<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      margin-bottom: .25rem;
      color: #333;
    }

    input {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.2); }
    input.invalid { border-color: #dc2626; }

    .error {
      color: #dc2626;
      font-size: .8rem;
      margin-top: .25rem;
      display: none;
    }
    .error.visible { display: block; }

    button[type="submit"] {
      width: 100%;
      padding: .65rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }
    button[type="submit"]:hover { background: #4338ca; }

    #success {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
    }
    #success.visible { display: block; }
    #success h2 { color: #16a34a; margin-bottom: .5rem; }
    #success p { color: #555; font-size: .9rem; }

    #form-area.hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-area">
      <h1>Create an account</h1>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Jane Doe" />
          <div class="error" id="name-error">Please enter your name.</div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="jane@example.com" />
          <div class="error" id="email-error">Please enter a valid email address.</div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Min. 8 characters" />
          <div class="error" id="password-error">Password must be at least 8 characters.</div>
        </div>

        <div class="field">
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" placeholder="Repeat password" />
          <div class="error" id="confirm-error">Passwords do not match.</div>
        </div>

        <button type="submit">Sign up</button>
      </form>
    </div>

    <div id="success">
      <h2>You're in!</h2>
      <p id="success-message">Welcome! Your account has been created.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('signup-form')

    function showError(inputId, errorId, show) {
      const input = document.getElementById(inputId)
      const error = document.getElementById(errorId)
      input.classList.toggle('invalid', show)
      error.classList.toggle('visible', show)
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault()

      const name     = document.getElementById('name').value.trim()
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const confirm  = document.getElementById('confirm').value

      let valid = true

      if (!name) { showError('name', 'name-error', true); valid = false }
      else        { showError('name', 'name-error', false) }

      if (!isValidEmail(email)) { showError('email', 'email-error', true); valid = false }
      else                      { showError('email', 'email-error', false) }

      if (password.length < 8) { showError('password', 'password-error', true); valid = false }
      else                     { showError('password', 'password-error', false) }

      if (confirm !== password) { showError('confirm', 'confirm-error', true); valid = false }
      else                      { showError('confirm', 'confirm-error', false) }

      if (valid) {
        document.getElementById('form-area').classList.add('hidden')
        document.getElementById('success-message').textContent =
          `Welcome, ${name}! Your account has been created.`
        document.getElementById('success').classList.add('visible')
      }
    })
  </script>
</body>
</html>
